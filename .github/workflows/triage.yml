name: Add Issues and PRs to Triage

on:
  issues:
    types:
      - opened
      - reopened
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  pull-requests: write
  issues: write

jobs:
  triage:
    uses: smallstep/workflows/.github/workflows/triage.yml@a99d801d470dc7950cba27fba10157f54437a1c7
    secrets: inherit
